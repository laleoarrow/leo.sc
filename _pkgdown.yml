url: https://laleoarrow.github.io/leo.sc/

template:
  bootstrap: 5
  bootswatch: flatly
  light-switch: true
  theme: breeze-light
  theme-dark: breeze-dark
  bslib:
    primary: "#1b4965"
    secondary: "#4f6d7a"
    success: "#2a9d8f"
    info: "#3a86c8"
    warning: "#f4a261"
    danger: "#d62828"
    light: "#f4f8fb"
    dark: "#0b1d2a"
    navbar-light-bg: "#1b4965"
    navbar-dark-bg: "#0b1d2a"
    base_font:
      google: "Source Sans 3"
    heading_font:
      google: "Inter"
    code_font:
      google: "JetBrains Mono"

home:
  strip_header: false
  title: leo.sc
  description: >
    A focused exploratory toolkit for practical single-cell data analysis,
    visualization, and in-silico perturbation experiments.
  links:
    - text: Seurat
      href: https://satijalab.org/seurat/
    - text: GitHub
      href: https://github.com/laleoarrow/leo.sc

navbar:
  structure:
    left: [home, install, tutorial, reference]
    right: [search, lightswitch, github]
  components:
    home:
      icon: fa-home
      text: Home
      href: index.html
    install:
      text: Installation
      href: articles/installation.html
    tutorial:
      text: Tutorial
      href: articles/tutorial-sko.html
    reference:
      text: Reference
      href: reference/index.html
    github:
      icon: fab fa-github
      href: https://github.com/laleoarrow/leo.sc
      aria-label: GitHub repository

footer:
  structure:
    left: [developed_by]
    right: [built_with]

reference:
  - title: Basic Workflow
    desc: Data loading, QC, metadata and baseline analysis utilities
    contents:
      - read_sc_data
      - seurat_basic_qc
      - seurat_basic_info
      - subset_srt
      - get_meta_colnames
      - get_cluster_counts
      - seurat_standard_normalize_and_scale
  - title: Functional Inference Pipeline
    desc: Virtual knock-out / knock-in analysis
    contents:
      - silico_ko
  - title: Cell Type and Marker Analysis
    contents:
      - gimme_marker
      - leo.marker
      - leo.ROIE
      - score_signature
      - plot_score_signature_heatmap
  - title: Multi-batch and Differential Structure
    contents:
      - check_gene_avg_in_multi_batch
      - check_gene_stats_in_multi_batch
      - subset_common_gene_in_multi_batch
      - leo.milo
      - leo_milo_vis
      - leo.augur
  - title: Visualization
    contents:
      - plot_qc
      - plot_gw_density
      - plot_highlight_cluster
      - plot_alluvial
      - plot_alluvial_sc
      - plot_dbee
  - title: Additional Utilities
    contents:
      - ROIE
      - calcROGUE
      - doublet_rate_dictionary
      - doublet_removal
      - filter_clusters_by_percent_or_cell_count
      - format_markers_for_upload
      - locate_most_different_g_in_2_group
      - remove_unwant_hvg
      - sort_string_numeric_clusters
