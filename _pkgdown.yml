url: https://laleoarrow.github.io/leo.sc/

template:
  bootstrap: 5
  bootswatch: darkly
  light-switch: true
  theme: breeze-light
  theme-dark: breeze-dark
  bslib:
    primary: "#1b4965"
    secondary: "#4f6d7a"
    success: "#2a9d8f"
    info: "#3a86c8"
    warning: "#f4a261"
    danger: "#d62828"
    light: "#f4f8fb"
    dark: "#0b1d2a"
    navbar-light-bg: "#1b4965"
    navbar-dark-bg: "#0b1d2a"
    base_font:
      google: "Source Sans 3"
    heading_font:
      google: "Inter"
    code_font:
      google: "JetBrains Mono"

home:
  strip_header: false
  title: leo.sc
  description: >
    A focused exploratory toolkit for practical single-cell data analysis,
    visualization, and in-silico perturbation experiments.
  links:
    - text: Seurat
      href: https://satijalab.org/seurat/
    - text: GitHub
      href: https://github.com/laleoarrow/leo.sc

navbar:
  structure:
    left: [home, install, tutorial, reference]
    right: [search, lightswitch, github]
  components:
    home:
      icon: fa-home
      text: Home
      href: index.html
    install:
      text: Installation
      href: articles/installation.html
    tutorial:
      text: Tutorial
      href: articles/tutorial-sko.html
    reference:
      text: Reference
      href: reference/index.html
    github:
      icon: fab fa-github
      href: https://github.com/laleoarrow/leo.sc
      aria-label: GitHub repository

footer:
  structure:
    left: [developed_by]
    right: [built_with]

reference:
  - title: Basic Functions
    desc: Core workflow functions located in R/basic.R
    contents:
      - read_sc_data
      - seurat_standard_normalize_and_scale
      - seurat_basic_qc
      - plot_qc
      - doublet_removal
      - doublet_rate_dictionary
      - seurat_basic_info
      - remove_unwant_hvg
      - subset_srt
      - write_10x_triple
      - metadata_write_10x
  - title: Metadata Management
    desc: Metadata manipulation functions located in R/metadata.R
    contents:
      - metadata_get_colnames
      - metadata_keep
      - metadata_drop
  - title: Cell Annotation & Markers
    desc: Marker identification and annotation utilities located in R/annotation.R
    contents:
      - format_markers_for_upload
      - sort_string_numeric_clusters
      - get_cluster_counts
      - filter_clusters_by_percent_or_cell_count
      - calcROGUE
      - score_signature
      - plot_score_signature_heatmap
      - locate_most_different_g_in_2_group
      - gimme_marker
  - title: Dictionaries & Reference Data
    desc: Built-in markers and reference data located in R/dict.R
    contents:
      - leo.marker
  - title: Celltype & Cluster analysis
    desc: Advanced cell type analysis located in R/celltype.R
    contents:
      - ROIE
      - leo.ROIE
      - leo.augur
      - leo.milo
      - leo_milo_vis
  - title: In-silico Knockout
    desc: Virtual gene perturbation simulations located in R/sko.R
    contents:
      - silico_ko
  - title: Multi-batch Processing
    desc: Functions for handling multi-batch datasets located in R/multi_batch.R
    contents:
      - check_gene_stats_in_multi_batch
      - check_gene_avg_in_multi_batch
      - subset_common_gene_in_multi_batch
  - title: Visualizations
    desc: Generic plotting utilities located in R/sc.plot.R
    contents:
      - plot_alluvial
      - plot_alluvial_sc
      - plot_gw_density
      - plot_highlight_cluster
      - plot_dbee
